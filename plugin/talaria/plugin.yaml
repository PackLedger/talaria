name: talaria
version: 0.1.0
description: >-
  Talaria — the mission-control adapter, packaged as a Hermes plugin. Runs on
  each Hermes agent and connects it to a mission-control fleet brain: on session
  start it registers the agent (POST /api/agents/register), then heartbeat-polls
  for work (GET /api/agents/{id}/heartbeat) and reports task status back. This is the
  per-agent half of Talaria; the central talaria-bridge sits in front of the
  Hermes dashboard (:9119) and translates hermes-workspace mission dispatch into
  mission-control REST. Non-destructive by construction: the plugin only reaches
  OUT to mission-control and never alters the agent's user-facing output. When
  TALARIA_MISSION_CONTROL_URL is unset the plugin loads and no-ops, so enabling
  it on the fleet is safe before the M0 contract is wired. Env: TALARIA_MISSION_CONTROL_URL,
  TALARIA_HEARTBEAT_SECONDS (0=off), TALARIA_AGENT_ROLE, TALARIA_AGENT_CAPABILITIES.
author: PackLedger
kind: standalone
hooks:
  - on_session_start
  - post_tool_call
  - on_session_end
